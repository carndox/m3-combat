<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>M3 Combat Tracker</title>
  <link rel="stylesheet" href="/css/main.css">
</head>
<body>
  <!-- Role selection modal -->
  <div id="modal-overlay"></div>

  <!-- Main layout -->
  <div id="app">
    <!-- Top toolbar -->
    <div id="toolbar"></div>

    <!-- Main content: canvas + sidebar -->
    <div id="content">
      <!-- Canvas area -->
      <div id="canvas-container">
        <canvas id="grid-canvas"></canvas>
      </div>

      <!-- Right sidebar -->
      <div id="sidebar">
        <div id="room-info">
          <span class="room-label">Room:</span>
          <span id="room-code-display">No room</span>
          <span id="sync-dirty" class="sync-dirty" style="display:none" title="Unsynced changes">●</span>
          <span id="sync-status" class="sync-status"></span>
        </div>

        <div id="initiative-panel"></div>

        <div id="stats-panel">
          <div class="stat-empty">Select a token</div>
        </div>

        <div id="sidebar-footer">
          <button class="btn btn-sm" id="btn-export" title="Export state">Export</button>
          <button class="btn btn-sm" id="btn-import" title="Import state">Import</button>
          <button class="btn btn-sm btn-danger" id="btn-disconnect" title="Disconnect">Leave</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Scripts in dependency order -->
  <script src="/js/utils.js"></script>
  <script src="/js/state.js"></script>
  <script src="/js/canvas.js"></script>
  <script src="/js/tokens.js"></script>
  <script src="/js/drawing.js"></script>
  <script src="/js/measure.js"></script>
  <script src="/js/stats.js"></script>
  <script src="/js/initiative.js"></script>
  <script src="/js/toolbar.js"></script>
  <script src="/js/sync.js"></script>
  <script src="/js/io.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
